name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install with bun, matching how Lovable/Vercel build this project.
      # bun.lock is the maintained, in-sync lockfile; --frozen-lockfile gives a
      # strict, reproducible install and fails if the lockfile drifts from
      # package.json. Don't use npm/package-lock.json here or locally -- it's
      # not maintained and drifts from package.json (see removed
      # package-lock.json; a stale copy caused local builds to fail on a
      # dependency npm's install skipped).
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Hard gates — these must pass. All green on main today.
      - name: Typecheck
        run: bunx tsc -p tsconfig.app.json --noEmit

      - name: Test
        run: bunx vitest run

      - name: Build
        run: bun run build

      # E2E smoke test: logs in against the real build and confirms the
      # dashboard renders, rather than the app getting stuck on
      # ProtectedRoute's approval-status check -- the exact failure class
      # behind two production outages (a bad env var, then a bad query
      # param baked into the bundle; neither was catchable by the steps
      # above, since both were runtime-only failures against the real
      # backend). Skips gracefully (passes, doesn't fail the build) until
      # E2E_TEST_EMAIL/E2E_TEST_PASSWORD secrets are added for a dedicated,
      # already-approved test account -- add them to turn this into a real
      # gate.
      - name: Install Playwright browser
        run: bunx playwright install --with-deps chromium

      - name: E2E smoke test
        run: bunx playwright test
        env:
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

      # Informational only for now: the repo has pre-existing lint debt
      # (mostly @typescript-eslint/no-explicit-any). Flip to a hard gate
      # once that backlog is cleared.
      - name: Lint (non-blocking)
        run: bun run lint
        continue-on-error: true
